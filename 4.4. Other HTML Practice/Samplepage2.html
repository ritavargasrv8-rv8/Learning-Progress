<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sample Page 2 with Take Me to Church </title>
</head>
<body>
    
    <h2> Sample Page 2 </h2>

    <h3>Sample Form</h3>

    <form>
        <label for="firstname"> First Name: </label>
        <input type="text" id="firstname" name="firstname" placeholder="Type your first name">

        <br />
        <br />

        <label for="lastname"> Last Name: </label>
        <input type="text" id="lastname" name="lastname" placeholder="Type your last name">

        <br />
        <br />

        <label for="age"> Age: </label>
        <input type="number" id="age" name="age" placeholder="18" min="0" max="120">

        <br />
        <br />

        <label for="email"> Email: </label>
        <input type="email" id="email" name="email" placeholder="example@email.com">

        <br />
        <br />

        <label for="gender"> Gender: </label>
            <br />

            <input type="radio" id="male" name="gender" value="male">
            <label for="male"> Male </label>
            <br />

            <input type="radio" id="female" name="gender" value="female">
            <label for="female"> Female </label>
            <br />

            <input type="radio" id="other" name="gender" value="other">
            <label for="other"> Other </label>
            <br />

            <input type="radio" id="prefernot" name="gender" value="prefernot">
            <label for="prefernot"> Prefer not to say </label>

    </form>
